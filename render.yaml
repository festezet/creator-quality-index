databases:
  - name: cqi-db
    plan: free
    databaseName: creator_quality_index

services:
  - type: web
    name: creator-quality-index
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn backend.app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cqi-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11"
